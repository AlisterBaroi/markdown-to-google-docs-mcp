# Cloud Build pipeline: build image → push to Artifact Registry → deploy to Cloud Run.
# Point the trigger at this file (Configuration → "Cloud Build configuration file",
# location: /cloudbuild.yaml) instead of the inline config.
#
# IMPORTANT: the VITE_* values are BUILD-TIME (Vite inlines them into the client bundle),
# so they're passed as --build-arg here. Set the real _VITE_* values as substitution
# variables in the trigger UI — they're kept out of the repo on purpose. They are public
# web-config values (they ship in the client bundle), not secrets.

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--build-arg=VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '--build-arg=VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '--build-arg=VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '--build-arg=VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '--build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg=VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '--build-arg=VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID'
      - '--build-arg=VITE_GOOGLE_CLIENT_ID=$_VITE_GOOGLE_CLIENT_ID'
      - .
      - '-f'
      - Dockerfile

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy            # `deploy` creates the service if missing, updates it if it exists
      - $_SERVICE_NAME
      - '--image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--platform=managed'
      - '--labels=managed-by=cloud-build,commit-sha=$COMMIT_SHA'
      # App requirements (idempotent on each deploy):
      - '--memory=2Gi'          # headless Chromium for server-side mermaid rendering
      - '--max-instances=1'     # MCP session state + temp image host live in memory
      # Optional: '--min-instances=1' keeps synced MCP sessions warm (scale-to-zero loses
      # in-memory state). Costs an always-on instance — enable only if you need it.
      #
      # NOTE: this does NOT make the service publicly reachable. After the first deploy, make it
      # public once (see docs/CloudRun_Deployment.md) — either `--allow-unauthenticated` or an
      # allUsers IAM binding. We intentionally don't set it here so the pipeline doesn't fail on
      # orgs that restrict public access (Domain Restricted Sharing).
      - '--quiet'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

substitutions:
  # Provide these as substitution variables in your Cloud Build TRIGGER (or via
  # `gcloud builds submit --substitutions=...`). They are NOT hardcoded here on purpose;
  # the empty defaults just document which keys you must set. See docs/CloudRun_Deployment.md.
  # ($REPO_NAME and $COMMIT_SHA are provided automatically for repo-connected triggers.)
  REPO_NAME: ''
  _DEPLOY_REGION: ''        # e.g. us-central1
  _AR_HOSTNAME: ''          # e.g. us-central1-docker.pkg.dev  (must match the region)
  _AR_REPOSITORY: ''        # your Artifact Registry repo name
  _AR_PROJECT_ID: ''        # your GCP project ID
  _SERVICE_NAME: ''         # your Cloud Run service name
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_FIREBASE_MEASUREMENT_ID: ''
  _VITE_GOOGLE_CLIENT_ID: ''

tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - md-to-docs
