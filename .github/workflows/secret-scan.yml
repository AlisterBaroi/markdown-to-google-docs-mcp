name: Secret Scan

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers every commit

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Scans code + full git history for secret patterns. Fails (exit 1) on any finding.
      # Public Firebase web config is allowlisted in .gitleaks.toml.
      - name: Scan for committed secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

      # Defense-in-depth: fail if env/session secret files are ever tracked by git.
      - name: Ensure secret files are not committed
        run: |
          if git ls-files --error-unmatch sessions.json >/dev/null 2>&1; then
            echo "::error::sessions.json is tracked by git — it can contain live OAuth access tokens. Remove it from the repo."
            exit 1
          fi
          tracked_env="$(git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '\.env\.example$' || true)"
          if [ -n "$tracked_env" ]; then
            echo "::error::Tracked .env file(s) detected (these may hold secrets):"
            echo "$tracked_env"
            exit 1
          fi
          echo "OK: no .env or session secret files are tracked."
